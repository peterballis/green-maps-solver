<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>Putt Solver</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Top bar: course/green/stimp selection -->
    <div class="top-bar">
        <select id="courseSelect"><option value="">Loading...</option></select>
        <select id="greenSelect"><option value="">--</option></select>
        <select id="layerSelect">
            <option value="slope">Slope</option>
            <option value="contour">Contour</option>
            <option value="aerial">Aerial</option>
        </select>
        <div class="stimp-group">
            <label>Stimp</label>
            <select id="stimpInput">
                <option value="7">7</option>
                <option value="7.5">7.5</option>
                <option value="8">8</option>
                <option value="8.5">8.5</option>
                <option value="9">9</option>
                <option value="9.5">9.5</option>
                <option value="10" selected>10</option>
                <option value="10.5">10.5</option>
                <option value="11">11</option>
                <option value="11.5">11.5</option>
                <option value="12">12</option>
                <option value="12.5">12.5</option>
                <option value="13">13</option>
                <option value="13.5">13.5</option>
                <option value="14">14</option>
            </select>
        </div>
    </div>

    <!-- Canvas -->
    <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="greenCanvas"></canvas>
        <div class="status-bar instruction" id="statusBar">Select a course and green</div>
    </div>

    <!-- Bottom bar: prev hole, reset, mode toggle, solution info, save, next hole -->
    <div class="bottom-bar">
        <button class="btn" id="prevHoleBtn">&lt;</button>
        <button class="btn primary" id="resetBtn">Reset</button>
        <button class="btn" id="modeBtn">Manual</button>
        <span class="label" id="solLabel" style="font-size:12px;flex:1;text-align:center;"></span>
        <button class="btn" id="downloadBtn">Save</button>
        <button class="btn" id="nextHoleBtn">&gt;</button>
    </div>

    <div class="offline-status" id="offlineStatus">
        <button class="btn" id="downloadCourseBtn" style="font-size:12px;padding:4px 10px;min-height:32px;">Download Course for Offline</button>
        <span id="downloadStatus"></span>
    </div>

    <script src="app.js"></script>
</body>
</html>
